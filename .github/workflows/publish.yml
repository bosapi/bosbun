name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - "packages/bosbun/package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine npm tag
        id: tag
        run: |
          VERSION=$(jq -r '.version' packages/bosbun/package.json)
          if echo "$VERSION" | grep -qE '-(rc|beta|alpha)'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing $VERSION with tag: $(grep tag "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish
        run: npm publish --tag "${{ steps.tag.outputs.tag }}" --access public
        working-directory: packages/bosbun
